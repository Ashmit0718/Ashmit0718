name: Update README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests python-dateutil lxml

      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.GH_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: python today.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md
          git commit -m "Auto-update profile stats" || echo "No changes to commit"
          git push
